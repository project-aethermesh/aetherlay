services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    environment:
      - VALKEY_URL=valkey://:SOME_PASS@valkey:6379
    depends_on:
      - valkey
    ports:
      - "8080:8080"
      - "8081:8081"

  valkey:
    image: valkey/valkey:8.1-alpine
    ports:
      - "6379:6379"
      # If you want to enable TLS, uncomment the following line
      #- "6380:6380"
    volumes:
      - ./.valkey-data:/data
      - ./.valkey.conf:/usr/local/etc/valkey/valkey.conf
      # If you want to enable TLS, uncomment the following line
      #- ./.tls:/etc/valkey/tls
    command: valkey-server /usr/local/etc/valkey/valkey.conf

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - ./.redisinsight:/data
    depends_on:
      - valkey

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9999:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=24h"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../aetherlay-dashboard.json:/var/lib/grafana/dashboards/aetherlay-dashboard.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped
